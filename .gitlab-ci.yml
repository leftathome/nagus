# GitLab CI for gitlab.orac.local (agentic/nagus).
#
# PRIMARY (gitlab-first) build + publish pipeline, mirroring glovebox: an MR/main
# unit gate (vet + race tests), then a kaniko image build, an OCI Helm chart
# push, and a GitLab Release on tags.
#
# All homelab-infra detail (kaniko CA workaround, the in-cluster registry
# Service, node pinning + pod sizing) lives in the PRIVATE homelab/ci-templates
# project and is pulled in via the include below. This file is mirrored to
# public GitHub, so it deliberately carries NO cluster specifics -- only the
# non-sensitive, project-specific wiring (image name, chart path).
#
# GitHub Actions (.github/workflows/) is the downstream public mirror that
# publishes the SAME image + chart to ghcr.io/leftathome for the HelmRelease to
# consume; tag/version conventions are kept in sync.

include:
  - project: 'homelab/ci-templates'
    ref: v0.1.1
    file: '/kaniko.yml'

stages:
  - test
  - build
  - chart
  - release

variables:
  GOPATH: "$CI_PROJECT_DIR/.cache/go"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  GOFLAGS: "-mod=mod"

cache:
  key:
    files:
      - go.sum
  paths:
    - .cache/go/pkg/mod
    - .cache/go-build

# Build/publish only on main and tags. The leading never-guard keeps scheduled
# (nightly) or manual (web) pipelines from rebuilding on a main ref -- matches
# glovebox even though nagus has no scheduled pipeline yet.
.build_rules: &build_rules
  - if: '$CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web"'
    when: never
  - if: '$CI_COMMIT_BRANCH == "main"'
  - if: '$CI_COMMIT_TAG'

# ---------------------------------------------------------------------------
# test -- the MR/main unit gate (vet + race). Node selector / pod sizing come
# from the included homelab/ci-templates global variables.
# ---------------------------------------------------------------------------
test:
  stage: test
  image: golang:1.26
  before_script:
    - "go version"
    - "go env GOPATH GOMODCACHE GOCACHE"
  script:
    - "go vet ./..."
    - "go test ./... -count=1 -race"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# ---------------------------------------------------------------------------
# build -- the single distroless image (CGO-free static binary + pure-Go
# sqlite). No enricher base, no connector matrix: nagus is one image.
# ---------------------------------------------------------------------------
build:
  extends: .kaniko-build
  stage: build
  needs: ["test"]
  rules: *build_rules
  variables:
    IMAGE: nagus
    DOCKERFILE: ./Dockerfile

# ---------------------------------------------------------------------------
# chart -- package + push charts/nagus as an OCI artifact. On a tag the template
# stamps chart version/appVersion from the tag.
# ---------------------------------------------------------------------------
chart:
  extends: .helm-push
  stage: chart
  needs: ["build"]
  rules: *build_rules
  variables:
    CHART_PATH: charts/nagus

# ---------------------------------------------------------------------------
# release -- create a GitLab Release for the tag. allow_failure while the orac
# private CA is not trusted in the runner image (release-cli talks to the GitLab
# API over HTTPS; the images + chart are already published by this stage). Same
# rationale as glovebox; drop allow_failure once the CA is trusted.
# ---------------------------------------------------------------------------
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Creating GitLab Release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
