name: Release

# Public-mirror release. On a v* tag, build cross-platform nagus binaries and
# attach them (plus checksums) to a GitHub Release. The container image + Helm
# chart are published separately (docker.yml, ci.yml helm job).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true

      - name: Build release binaries
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          for plat in linux/amd64 linux/arm64 darwin/arm64 windows/amd64; do
            GOOS="${plat%/*}"
            GOARCH="${plat#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            DIR="dist/${GOOS}-${GOARCH}"
            mkdir -p "$DIR"
            echo "building nagus for ${GOOS}/${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w -X main.version=${TAG}" -o "${DIR}/nagus${EXT}" ./cmd/nagus
            case "$GOOS" in
              windows) (cd "$DIR" && zip -r "../../release/nagus-${TAG}-${GOOS}-${GOARCH}.zip" .) ;;
              *)       tar -czf "release/nagus-${TAG}-${GOOS}-${GOARCH}.tar.gz" -C "$DIR" . ;;
            esac
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
          prerelease: ${{ contains(github.ref_name, '-') }}
