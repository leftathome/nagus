name: CI

# Downstream public-mirror CI. Primary dev/test happens on gitlab.orac.local
# (.gitlab-ci.yml); this runs on the GitHub mirror for public visibility and,
# later, release artifacts. Kept intentionally minimal at scaffold stage.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leftathome

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -race

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: CGO_ENABLED=0 go build -o nagus ./cmd/nagus

  helm:
    name: Package and push Helm chart
    runs-on: ubuntu-latest
    needs: test
    # Publish the chart on a main push (moving version) and on a v* tag (pinned).
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On a v* tag, stamp the chart version + appVersion from the tag so the
      # published chart tracks the release; on a plain main push, fall back to
      # Chart.yaml's version.
      - name: Package Helm chart
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            echo "tagged release: packaging chart version ${V}"
            helm package charts/nagus --version "${V}" --app-version "${V}"
          else
            helm package charts/nagus
          fi

      - name: Push Helm chart to GHCR
        run: helm push nagus-*.tgz oci://${{ env.IMAGE_PREFIX }}/charts
