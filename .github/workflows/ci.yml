name: CI

# Downstream public-mirror CI. Primary dev/test happens on gitlab.orac.local
# (.gitlab-ci.yml); this runs on the GitHub mirror for public visibility and,
# later, release artifacts. Kept intentionally minimal at scaffold stage.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -race

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        run: CGO_ENABLED=0 go build -o nagus ./cmd/nagus
