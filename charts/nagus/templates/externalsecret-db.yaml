{{- if and (eq .Values.storage.backend "postgres") .Values.storage.postgres.externalSecret.enabled (not .Values.storage.postgres.existingSecret) -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "nagus.dbSecretName" . }}
  labels:
    {{- include "nagus.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.storage.postgres.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.storage.postgres.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.storage.postgres.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "nagus.dbSecretName" . }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: {{ .Values.storage.postgres.role | quote }}
        # ESO renders the fetched password; the double braces are for external-secrets, not helm.
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.storage.postgres.externalSecret.remoteRef.key | quote }}
        property: {{ .Values.storage.postgres.externalSecret.remoteRef.property | quote }}
{{- end }}
