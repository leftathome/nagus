apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nagus.fullname" . }}
  labels:
    {{- include "nagus.labels" . | nindent 4 }}
spec:
  replicas: 1
  # sqlite is a single-writer single file: never run >1 replica against one PVC.
  # Recreate avoids two pods briefly sharing the RWO volume during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "nagus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nagus.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nagus.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nagus
          image: {{ include "nagus.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - serve
          env:
            - name: NAGUS_CATEGORY
              value: {{ .Values.category | quote }}
            - name: NAGUS_STORE_BACKEND
              value: {{ .Values.storage.backend | quote }}
            - name: NAGUS_DB
              value: {{ .Values.storage.sqlite.path | quote }}
            {{- if eq .Values.storage.backend "postgres" }}
            - name: NAGUS_PG_HOST
              value: {{ .Values.storage.postgres.host | quote }}
            - name: NAGUS_PG_PORT
              value: {{ .Values.storage.postgres.port | quote }}
            - name: NAGUS_PG_DB
              value: {{ .Values.storage.postgres.database | quote }}
            - name: NAGUS_PG_SSLMODE
              value: {{ .Values.storage.postgres.sslmode | default "require" | quote }}
            - name: NAGUS_PG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "nagus.dbSecretName" . | quote }}
                  key: {{ .Values.storage.postgres.userKey | default "username" | quote }}
            - name: NAGUS_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nagus.dbSecretName" . | quote }}
                  key: {{ .Values.storage.postgres.passwordKey | default "password" | quote }}
            {{- end }}
            - name: NAGUS_LISTEN
              value: {{ .Values.serve.listen | quote }}
            - name: NAGUS_MIN_CAPACITY
              value: {{ .Values.serve.minCapacityTB | quote }}
            - name: NAGUS_INGEST_INTERVAL
              value: {{ include "nagus.ingestInterval" . | quote }}
            - name: NAGUS_OFFLINE
              value: {{ or .Values.demo.enabled .Values.serve.offline | quote }}
            - name: NAGUS_EBAY_QUERY
              value: {{ .Values.ebay.query | quote }}
            {{- if .Values.demo.enabled }}
            - name: NAGUS_EBAY_FIXTURE
              value: /demo/browse_search.json
            {{- end }}
            {{- if .Values.watches }}
            - name: NAGUS_WATCHES
              value: /etc/nagus/watches.json
            {{- end }}
            {{- if eq .Values.category "land" }}
            - name: NAGUS_LAND_BUDGET_CENTS
              value: {{ .Values.land.budgetCents | quote }}
            - name: NAGUS_LAND_MIN_ACREAGE
              value: {{ .Values.land.minAcreageAcres | quote }}
            - name: NAGUS_LAND_MAX_ACREAGE
              value: {{ .Values.land.maxAcreageAcres | quote }}
            - name: NAGUS_CL_CITY
              value: {{ .Values.land.craigslistCity | quote }}
            - name: NAGUS_CL_CATEGORY
              value: {{ .Values.land.craigslistCategory | quote }}
            {{- if .Values.land.rentcastSecret }}
            - name: NAGUS_RENTCAST_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.land.rentcastSecret }}
                  key: NAGUS_RENTCAST_KEY
            {{- end }}
            {{- end }}
          {{- $secret := include "nagus.ebaySecretName" . }}
          {{- if and $secret (not .Values.demo.enabled) }}
          envFrom:
            - secretRef:
                name: {{ $secret }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            {{- if .Values.demo.enabled }}
            - name: demo
              mountPath: /demo
              readOnly: true
            {{- end }}
            {{- if .Values.watches }}
            - name: watches
              mountPath: /etc/nagus
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          {{- if and (eq .Values.storage.backend "sqlite") .Values.storage.sqlite.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "nagus.fullname" .)) .Values.storage.sqlite.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.demo.enabled }}
        - name: demo
          configMap:
            name: {{ include "nagus.fullname" . }}-demo
        {{- end }}
        {{- if .Values.watches }}
        - name: watches
          configMap:
            name: {{ include "nagus.fullname" . }}-watches
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
