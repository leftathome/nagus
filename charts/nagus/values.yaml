# Default values for the nagus chart. See charts/nagus/README-esque NOTES.txt.

image:
  # Deployable image published to GHCR by the GitHub mirror (same convention as
  # glovebox). The GitLab pipeline also builds to the in-cluster registry for
  # dev/test; the HelmRelease consumes the GHCR image.
  repository: ghcr.io/leftathome/nagus
  # tag defaults to .Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Which category bundle this release serves (v1 wires only "hdd").
category: hdd

# The long-running `nagus serve` process: the MCP server at /mcp (agent-facing,
# tools search_items + get_item) plus a plain-HTTP read-only pull at /search +
# /item, plus an optional in-process ingest loop (sqlite is single-writer, so one
# pod both ingests and serves -- no cross-pod file sharing).
serve:
  listen: ":8080"
  minCapacityTB: 6
  # ingestInterval "0" disables scheduled ingest (the surface still serves the
  # existing corpus). Set e.g. "30m" once a source is configured (ebay creds or
  # demo mode), otherwise startup fails fast with "ingest enabled but no source".
  ingestInterval: "0"
  # offline scores against the built-in demo reference instead of the live feed.
  offline: false

ebay:
  query: "internal hard drive"
  # Live-ingest credentials are injected as env from a Secret; NEVER inline them
  # here (they belong in Vault, synced via externalSecret below or a pre-made
  # Secret named in existingSecret). The Secret must expose the keys
  # NAGUS_EBAY_CLIENT_ID and NAGUS_EBAY_CLIENT_SECRET.
  existingSecret: ""

# demo.enabled makes the release self-contained and demonstrable with NO secrets
# and NO network: it mounts the bundled eBay fixture and turns on offline scoring
# + scheduled ingest, so `helm install ... --set demo.enabled=true` yields ranked
# results in-cluster. Turn OFF for real deployments.
demo:
  enabled: false
  ingestInterval: "1h"

# land-category tuning (only consumed when category: land). Scoring is
# structure-first; these set the budget + acreage window. Craigslist is the
# source (keyless RSS); Rentcast (paid, optional) supplies the structure/
# assessed-value signals -- without it, land surfaces as unassessed candidates.
land:
  budgetCents: 0
  minAcreageAcres: 1
  maxAcreageAcres: 0
  craigslistCity: ""
  craigslistCategory: reo
  # rentcastSecret names a pre-made Secret exposing key NAGUS_RENTCAST_KEY. Leave
  # empty to let rentcastExternalSecret (below) sync it from Vault instead; set it
  # to override with a standalone Secret and skip the ExternalSecret.
  rentcastSecret: ""
  # rentcastExternalSecret syncs the Rentcast key from the SHARED app-source Vault
  # path (eso/nagus/sources, property rentcast_key) into a local Secret exposing
  # NAGUS_RENTCAST_KEY. Same path the eBay creds live under (see externalSecret
  # below) -- one "sources" secret, one per-property mapping.
  rentcastExternalSecret:
    enabled: false
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    refreshInterval: "1h"
    remoteRef:
      key: eso/nagus/sources
      property: rentcast_key

# watches are saved search_items queries + notify thresholds that the /watches
# endpoint evaluates for openclaw's delivery cron (candidates -> quiet inbox,
# strong matches -> ping; audience is routed by openclaw's household resolver).
# When non-empty, the chart renders a ConfigMap and points NAGUS_WATCHES at it.
# See docs/examples/watches.hdd.json for the shape.
watches: []
  # - name: cheap-big-hdd
  #   category: hdd
  #   audience: steve
  #   strong_verdicts: ["great"]

storage:
  # backend: sqlite (default, PVC-backed single file) | postgres (shared CNPG).
  # Both adapters are wired (internal/store/{sqlitestore,postgresstore}).
  # postgres targets the shared CloudNativePG cluster; the database + managed
  # role are provisioned via gitops (design 12.1), and this chart consumes the
  # resulting credentials Secret (storage.postgres.existingSecret). pgvector is
  # deferred: v1 postgres is FTS-only.
  backend: sqlite
  sqlite:
    path: /data/nagus.db
    persistence:
      enabled: true
      size: 2Gi
      storageClass: ""
      accessMode: ReadWriteOnce
      # existingClaim, if set, is used instead of creating a PVC.
      existingClaim: ""
  postgres:
    host: postgres-rw.databases-app.svc.cluster.local
    port: 5432
    database: nagus
    sslmode: require
    role: nagus
    # A pod can only mount Secrets in its OWN namespace, but the CNPG managed-role
    # secret (nagus-db-role) is created in databases-app. So -- mirroring the
    # aether/registry pattern in the gitops repo -- the chart syncs the SAME Vault
    # key into a LOCAL basic-auth secret in this namespace, which the Deployment
    # references. Keys: username/password. Set existingSecret to reference a
    # pre-made local secret instead and disable externalSecret below.
    existingSecret: ""
    userKey: username
    passwordKey: password
    externalSecret:
      enabled: true
      secretStoreRef:
        name: vault-backend
        kind: ClusterSecretStore
      refreshInterval: "1h"
      # Vault key + property holding the role password. This is the SAME key the
      # gitops externalsecret-nagus-role.yaml uses, so both the managed role and
      # this consumer secret derive from one source of truth.
      remoteRef:
        key: eso/nagus/infrastructure
        property: postgres_password

# externalSecret renders an external-secrets.io ExternalSecret that syncs the
# eBay credentials from the shared app-source Vault path (eso/nagus/sources) into
# a k8s Secret consumed by the Deployment. Same path Rentcast lives under (see
# land.rentcastExternalSecret) -- properties are namespaced per source.
externalSecret:
  enabled: false
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: "1h"
  # target Secret name to create; defaults to "<fullname>-ebay" when empty.
  targetName: ""
  # data maps k8s Secret keys <- Vault paths.
  data: []
  #  - secretKey: NAGUS_EBAY_CLIENT_ID
  #    remoteRef:
  #      key: eso/nagus/sources
  #      property: ebay_client_id
  #  - secretKey: NAGUS_EBAY_CLIENT_SECRET
  #    remoteRef:
  #      key: eso/nagus/sources
  #      property: ebay_client_secret

service:
  type: ClusterIP
  port: 8080

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 3
    periodSeconds: 10
